<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand System Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #1a1a2e;
      margin-bottom: 10px;
    }
    .status {
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      font-weight: 500;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
      border: 2px solid #22c55e;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      border: 2px solid #ef4444;
    }
    .status.info {
      background: #dbeafe;
      color: #1e40af;
      border: 2px solid #3b82f6;
    }
    .test-section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .test-section h2 {
      margin-top: 0;
      color: #1a1a2e;
    }
    .brand-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 15px 0;
    }
    .brand-info-item {
      padding: 10px;
      background: #f9fafb;
      border-radius: 8px;
    }
    .brand-info-item strong {
      display: block;
      color: #6b7280;
      font-size: 0.875rem;
      margin-bottom: 5px;
    }
    .color-box {
      display: inline-block;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 2px solid #e5e7eb;
      margin-right: 8px;
      vertical-align: middle;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin: 5px;
      transition: all 0.3s ease;
    }
    button:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }
    pre {
      background: #1f2937;
      color: #10b981;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <h1>🧪 Brand System Test</h1>
  <p>This page tests the brand loading system and displays diagnostic information.</p>

  <div id="test-results"></div>

  <div class="test-section">
    <h2>Quick Actions</h2>
    <button onclick="testBrand('ayat')">Test Ayat</button>
    <button onclick="testBrand('demahope')">Test Demahope</button>
    <button onclick="testBrand('gift')">Test GIFT</button>
    <button onclick="testBrand('hosea')">Test Hosea</button>
    <button onclick="testBrand('metropolitan')">Test Metropolitan</button>
    <button onclick="testBrand('temer')">Test Temer</button>
    <button onclick="window.location.href='brand-switcher.html'">Brand Switcher</button>
  </div>

  <div class="test-section">
    <h2>Current URL</h2>
    <pre id="url-info"></pre>
  </div>

  <script type="module">
    import { BrandLoader } from './js/BrandLoader.js';

    const results = document.getElementById('test-results');
    const urlInfo = document.getElementById('url-info');

    // Display URL info
    urlInfo.textContent = `URL: ${window.location.href}\nPath: ${window.location.pathname}\nSearch: ${window.location.search}`;

    // Test function
    window.testBrand = function(brandSlug) {
      window.location.href = `/?brand=${brandSlug}`;
    };

    // Run tests
    async function runTests() {
      const tests = [];
      
      // Test 1: Brand detection
      const brandLoader = new BrandLoader();
      tests.push({
        name: 'Brand Detection',
        status: brandLoader.brandSlug ? 'success' : 'info',
        message: brandLoader.brandSlug 
          ? `✓ Brand detected: ${brandLoader.brandSlug}` 
          : 'ℹ No brand detected (use ?brand=name or /brand/)'
      });

      // Test 2: Load brand config
      try {
        const config = await brandLoader.loadBrandConfig();
        if (config) {
          tests.push({
            name: 'Brand Config Load',
            status: 'success',
            message: `✓ Successfully loaded ${brandLoader.brandSlug} config`
          });

          // Test 3: Display brand info
          if (config.brand) {
            tests.push({
              name: 'Brand Identity',
              status: 'success',
              message: `✓ ${config.brand.companyName}`,
              details: config.brand
            });
          }

          // Test 4: Theme
          if (config.theme) {
            tests.push({
              name: 'Theme Colors',
              status: 'success',
              message: `✓ Primary: ${config.theme.primary}`,
              colors: config.theme
            });
          }
        } else {
          tests.push({
            name: 'Brand Config Load',
            status: 'error',
            message: '✗ Failed to load brand config'
          });
        }
      } catch (error) {
        tests.push({
          name: 'Brand Config Load',
          status: 'error',
          message: `✗ Error: ${error.message}`
        });
      }

      // Display results
      let html = '';
      tests.forEach(test => {
        html += `<div class="status ${test.status}">${test.message}</div>`;
        
        if (test.details) {
          html += '<div class="brand-info">';
          Object.entries(test.details).forEach(([key, value]) => {
            if (typeof value === 'string' && !key.includes('logo')) {
              html += `
                <div class="brand-info-item">
                  <strong>${key}</strong>
                  ${value}
                </div>
              `;
            }
          });
          html += '</div>';
        }

        if (test.colors) {
          html += '<div class="brand-info">';
          ['primary', 'primaryDark', 'primaryLight'].forEach(colorKey => {
            if (test.colors[colorKey]) {
              html += `
                <div class="brand-info-item">
                  <strong>${colorKey}</strong>
                  <span class="color-box" style="background: ${test.colors[colorKey]}"></span>
                  ${test.colors[colorKey]}
                </div>
              `;
            }
          });
          html += '</div>';
        }
      });

      results.innerHTML = html;
    }

    runTests();
  </script>
</body>
</html>
