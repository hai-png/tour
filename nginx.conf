# =============================================================================
# HAI PNG Virtual Tour - Nginx Configuration
# =============================================================================
# For production deployment on Nginx web servers
# Copy to /etc/nginx/sites-available/hai-tour and symlink to sites-enabled
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;  # CHANGE THIS

    # Redirect HTTP to HTTPS (recommended for production)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;  # CHANGE THIS

    # =============================================================================
    # SSL Configuration (using Let's Encrypt as example)
    # =============================================================================
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;  # CHANGE THIS
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;  # CHANGE THIS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # =============================================================================
    # Document Root
    # =============================================================================
    root /var/www/hai-tour;  # CHANGE THIS to your deployment path
    index index.html;

    # =============================================================================
    # Security Headers
    # =============================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (adjust for your CDN resources)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https: http:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), fullscreen=(self)" always;

    # Cross-Origin Policies
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # =============================================================================
    # Gzip Compression
    # =============================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # =============================================================================
    # Browser Caching
    # =============================================================================

    # HTML - No cache
    location ~* \.(html|htm)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
    }

    # Service Worker - No cache (critical!)
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires off;
        add_header Content-Type "application/javascript";
    }

    # Manifest - Short cache
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/manifest+json";
    }

    # CSS and JavaScript - Cache for 1 week
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=604800, must-revalidate";
        expires 1w;
    }

    # Images - Cache for 1 month
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        expires 1M;
    }

    # Fonts - Cache for 1 month
    location ~* \.(woff2|woff|ttf|eot)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        expires 1M;
    }

    # JSON config files - Cache for 1 hour
    location ~* \.json$ {
        add_header Cache-Control "public, max-age=3600";
        expires 1h;
    }

    # =============================================================================
    # SPA Routing - Handle client-side routing
    # =============================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =============================================================================
    # Block Access to Sensitive Files
    # =============================================================================

    # Block hidden files (except .well-known)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Allow .well-known for Let's Encrypt
    location ~ /.well-known {
        allow all;
    }

    # Block backup and source files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block README and documentation
    location ~ ^/(README|DEPLOYMENT|CHANGELOG).*\.(md|txt)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # =============================================================================
    # Performance Optimizations
    # =============================================================================

    # Disable access logs for static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|woff|ttf|svg)$ {
        access_log off;
    }

    # Buffer settings for client connections
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 100M;
    large_client_header_buffers 2 1k;

    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # =============================================================================
    # PWA Support
    # =============================================================================

    # Ensure service worker scope is correct
    # The service worker file must be at the root for full site coverage
}

